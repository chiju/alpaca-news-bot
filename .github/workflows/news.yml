name: Portfolio Bot

on:
  schedule:
    - cron: "0 12 * * 1-5"              # 🌅 Morning digest 8am ET
    - cron: "0 17 * * 1-5"              # 📊 Midday digest 12pm ET
    - cron: "0 21 * * 1-5"              # 🌆 EOD digest 4pm ET
    - cron: "0 13 * * 1-5"              # ⚙️ Open new positions at market open
    - cron: "*/30 13-21 * * 1-5"        # ⚙️ Trading engines every 30min
    - cron: "0 14-20 * * 1-5"           # 📊 Options flow every hour 10am-4pm ET
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

jobs:
  news-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event.schedule == '0 12 * * 1-5' ||
      github.event.schedule == '0 17 * * 1-5' ||
      github.event.schedule == '0 21 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python news_bot.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      - name: Commit sentiment history DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment_history.db
          git diff --staged --quiet || git commit -m "Update sentiment history [skip ci]"
          git push

  daily-report:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 21 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python daily_report.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_CSP_API_KEY: ${{ secrets.ALPACA_CSP_API_KEY }}
          ALPACA_CSP_SECRET_KEY: ${{ secrets.ALPACA_CSP_SECRET_KEY }}

  trading-engines:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 13 * * 1-5' ||
      github.event.schedule == '*/30 13-21 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: CSP Engine
        run: python run_strategy.py --strategy csp
        env:
          ALPACA_CSP_API_KEY: ${{ secrets.ALPACA_CSP_API_KEY }}
          ALPACA_CSP_SECRET_KEY: ${{ secrets.ALPACA_CSP_SECRET_KEY }}

      - name: Wheel Strategy
        run: python run_strategy.py --strategy wheel
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Bull Put Spread
        run: python run_strategy.py --strategy bull_put
        env:
          ALPACA_BULL_PUT_SPREAD_API_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_API_KEY }}
          ALPACA_BULL_PUT_SPREAD_SECRET_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_SECRET_KEY }}

      - name: Iron Condor
        run: python run_strategy.py --strategy iron_condor
        env:
          ALPACA_IRON_CONDOR_API_KEY: ${{ secrets.ALPACA_IRON_CONDOR_API_KEY }}
          ALPACA_IRON_CONDOR_SECRET_KEY: ${{ secrets.ALPACA_IRON_CONDOR_SECRET_KEY }}

      - name: Covered Call
        run: python run_strategy.py --strategy covered_call
        env:
          ALPACA_COVERED_CALL_API_KEY: ${{ secrets.ALPACA_COVERED_CALL_API_KEY }}
          ALPACA_COVERED_CALL_SECRET_KEY: ${{ secrets.ALPACA_COVERED_CALL_SECRET_KEY }}

  options-flow:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 14-20 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Options Flow Scanner
        run: python options_flow_scanner.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
