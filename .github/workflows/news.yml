name: Portfolio Bot

on:
  # All schedules handled by cron-job.org via workflow_dispatch
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run: digest, trading, report'
        required: false
        default: 'digest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

jobs:
  news-digest:
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.job == 'digest' ||
      github.event.inputs.job == 'report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python news_bot.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  daily-report:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python daily_report.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_CSP_API_KEY: ${{ secrets.ALPACA_CSP_API_KEY }}
          ALPACA_CSP_SECRET_KEY: ${{ secrets.ALPACA_CSP_SECRET_KEY }}
          ALPACA_BULL_PUT_SPREAD_API_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_API_KEY }}
          ALPACA_BULL_PUT_SPREAD_SECRET_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_SECRET_KEY }}
          ALPACA_IRON_CONDOR_API_KEY: ${{ secrets.ALPACA_IRON_CONDOR_API_KEY }}
          ALPACA_IRON_CONDOR_SECRET_KEY: ${{ secrets.ALPACA_IRON_CONDOR_SECRET_KEY }}
          ALPACA_COVERED_CALL_API_KEY: ${{ secrets.ALPACA_COVERED_CALL_API_KEY }}
          ALPACA_COVERED_CALL_SECRET_KEY: ${{ secrets.ALPACA_COVERED_CALL_SECRET_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

  trading-engines:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'trading'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: CSP Engine
        run: python run_strategy.py --strategy csp
        env:
          ALPACA_CSP_API_KEY: ${{ secrets.ALPACA_CSP_API_KEY }}
          ALPACA_CSP_SECRET_KEY: ${{ secrets.ALPACA_CSP_SECRET_KEY }}

      - name: Wheel Strategy
        run: python run_strategy.py --strategy wheel
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Bull Put Spread
        run: python run_strategy.py --strategy bull_put
        env:
          ALPACA_BULL_PUT_SPREAD_API_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_API_KEY }}
          ALPACA_BULL_PUT_SPREAD_SECRET_KEY: ${{ secrets.ALPACA_BULL_PUT_SPREAD_SECRET_KEY }}

      - name: Iron Condor
        run: python run_strategy.py --strategy iron_condor
        env:
          ALPACA_IRON_CONDOR_API_KEY: ${{ secrets.ALPACA_IRON_CONDOR_API_KEY }}
          ALPACA_IRON_CONDOR_SECRET_KEY: ${{ secrets.ALPACA_IRON_CONDOR_SECRET_KEY }}

      - name: Covered Call
        run: python run_strategy.py --strategy covered_call
        env:
          ALPACA_COVERED_CALL_API_KEY: ${{ secrets.ALPACA_COVERED_CALL_API_KEY }}
          ALPACA_COVERED_CALL_SECRET_KEY: ${{ secrets.ALPACA_COVERED_CALL_SECRET_KEY }}
